# ── Messages d'erreur explicites ────────────────────────────────────────────
# Par défaut Spring Boot masque le message d'exception dans la réponse JSON.
# GlobalExceptionHandler s'en charge déjà, mais on l'active aussi ici en filet
# de sécurité pour les erreurs qui ne passeraient pas par lui.
server.error.include-message=always
server.error.include-binding-errors=always

# Permet à GlobalExceptionHandler d'intercepter les 404 (route inexistante)
# au lieu de la page blanche par défaut de Spring Boot.
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

